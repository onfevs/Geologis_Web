<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#000000"/>
  <!-- Outer gold ring -->
  <circle cx="32" cy="32" r="29" stroke="#D4AF37" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- "O" stylized letter with geological layers -->
  <text x="32" y="42" font-family="Georgia, serif" font-size="32" font-weight="900" font-style="italic"
        text-anchor="middle" fill="none" stroke="#D4AF37" stroke-width="1">G</text>
  <text x="32" y="42" font-family="Georgia, serif" font-size="32" font-weight="900" font-style="italic"
        text-anchor="middle" fill="#D4AF37">G</text>
  <!-- Subtle geological scan lines at bottom -->
  <line x1="16" y1="50" x2="48" y2="50" stroke="#D4AF37" stroke-width="0.8" opacity="0.3"/>
  <line x1="20" y1="53" x2="44" y2="53" stroke="#D4AF37" stroke-width="0.5" opacity="0.2"/>
</svg>
