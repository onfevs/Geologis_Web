  <script>

  <style>
    /* ── Themed Custom Scrollbars ── */
    ::-webkit-scrollbar {

    }

      /* zinc-800 */
    }

    body {

      /* Default to dark mode colors if script fails, but transition smoothly */

    /* ── Warm Ivory Light Mode Palette (CSS variables — theme-aware) ── */
    :root {
      --bg-primary: #EDE8DF;
      --bg-secondary: #E4DDD2;
      --bg-card: #F5F0E8;
      --bg-footer: #D8D2C8;

    }

    html.dark {
      --bg-primary: #000000;
      --bg-secondary: #09090b;
      --bg-card: #0a0a0a;
      --bg-footer: #000000;
      --border-warm: rgba(212, 175, 55, 0.10);
      --text-primary: #ffffff;
      --text-muted: #71717a;
    }

    /* Utility classes that reference CSS vars (usable in JSX without Tailwind compile) */
    .section-primary {
      background-color: var(--bg-primary);
    }

    .section-secondary {
      background-color: var(--bg-secondary);
    }

    .card-surface {
      background-color: var(--bg-card);
      border-color: var(--border-warm);
    }

    .footer-surface {
      background-color: var(--bg-footer);
    }

    html:not(.dark) body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
    }

    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @media (min-width: 1024px) {

      body,
      a,
      button,
      input,
      textarea,
      [role="button"] {
        cursor: none !important;
      }
    }

    /* ── Scrollbar hide utility (used by horizontal snap tabs) ── */
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    /* ── Skip to content link (accessibility) ── */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      z-index: 9999;
      padding: 0.5rem 1rem;
      background: #D4AF37;
      color: #000;
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      border-radius: 0 0 0.5rem 0.5rem;
      transition: top 0.2s;
    }

    .skip-link:focus {
      top: 0;
    }

    .font-title {
      font-family: 'Playfair Display', serif;
    }

    .font-subtitle {
      font-family: 'Outfit', sans-serif;
    }

    .font-body {
      font-family: 'Inter', sans-serif;
    }


    ::-webkit-scrollbar-thumb {
      background: #D4AF37;
    }

    /* NOTE: backface-visibility removed from * selector — it breaks 3D flip cards */
    .will-change-transform {
      will-change: transform, opacity;
    }

    /* ══════════════════════════════════════════════════
       FLIP CARD — Premium GSAP-ready
    ══════════════════════════════════════════════════ */
    .flip-card-container {
      perspective: 1600px;
      cursor: pointer;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.85s cubic-bezier(0.23, 1, 0.32, 1);
      border-radius: 1rem;
      will-change: transform;
    }

    .flip-card-container:hover .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-container:hover {
      filter: drop-shadow(0 0 24px rgba(212, 175, 55, 0.22));
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      backface-visibility: hidden !important;
      -webkit-backface-visibility: hidden !important;
      border-radius: 1rem;
      overflow: hidden;
    }

    .flip-card-back {
      transform: rotateY(180deg);
    }

    /* ─ CRITICAL FIX: hidden faces must NEVER intercept touches ─ */
    /* When card is NOT flipped: back face is invisible → block all events */
    .flip-card-inner:not([style*="rotateY(180deg)"]) .flip-card-back,
    .flip-card-inner:not(.mobile-flipped) .flip-card-back {
      pointer-events: none !important;
    }

    /* When card IS flipped: front face is invisible → block all events */
    .flip-card-inner[style*="rotateY(180deg)"] .flip-card-front,
    .flip-card-inner.mobile-flipped .flip-card-front {
      pointer-events: none !important;
    }

    /* Leaflet maps inside cards are purely decorative — never interactive */
    .flip-card-back .leaflet-container,
    .flip-card-back .leaflet-pane,
    .flip-card-back .leaflet-control,
    .flip-card-back .leaflet-interactive {
      pointer-events: none !important;
    }

    /* Shimmer on back face */
    .flip-card-back::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg,
          transparent 40%,
          rgba(212, 175, 55, 0.04) 50%,
          transparent 60%);
      pointer-events: none;
    }

    /* Golden Filter — desvanece  al hacer hover */
    .gold-filter {
      filter: sepia(70%) saturate(180%) brightness(62%) hue-rotate(-8deg);
      transition: filter 0.65s ease;
    }

    .flip-card-container:hover .gold-filter {
      filter: sepia(5%) saturate(110%) brightness(98%);
    }

    /* Flip hint icon */
    .flip-hint-icon {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 30px;
      height: 30px;
      background: rgba(212, 175, 55, 0.12);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      transition: background 0.4s ease, border-color 0.4s ease, transform 0.4s ease;
    }

    .flip-card-container:hover .flip-hint-icon {
      background: rgba(212, 175, 55, 0.22);
      border-color: rgba(212, 175, 55, 0.65);
      transform: rotate(180deg);
    }

    /* ══════════════════════════════════════════════════
       MAPA LEAFLET — Ocultar Atribución y Controles
    ══════════════════════════════════════════════════ */
    .leaflet-control-container,
    .leaflet-bottom.leaflet-right {
      display: none !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }

    /* ══════════════════════════════════════════════════
       HAMBURGER GSAP — líneas animadas
    ══════════════════════════════════════════════════ */
    .hamburger-line {
      display: block;
      width: 24px;
      height: 2px;
      border-radius: 2px;
      background: #ffffff;
      transform-origin: center;
    }



    /* Animación para el carrusel infinito */
    @keyframes scroll {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .animate-scroll {
      animation: scroll 30s linear infinite;
    }

    .animate-scroll:hover {
      animation-play-state: paused;
    }
  </style>
